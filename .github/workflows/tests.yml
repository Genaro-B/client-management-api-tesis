name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        working-directory: ./backend
        run: |
          echo "PWD: $(pwd)"
          echo "FILES: $(ls -la)"
          python -c "import openpyxl, httpx, fastapi, sqlalchemy, pydantic; print('OK')"

      - name: Diagnose pytest
        shell: bash
        continue-on-error: true
        run: |
          set +e
          {
            echo "### Pytest Diagnostics"
            echo ""
            echo "**From repo root:**"
            echo '```'
            python -m pytest --version 2>&1
            echo '--- collect-only ---'
            python -m pytest backend/tests/ --collect-only -q 2>&1
            rc1=$?
            echo "exit: $rc1"
            echo '```'
            echo ""
            echo "**From backend/:**"
            echo '```'
            (cd backend && python -m pytest --version 2>&1)
            echo '--- collect-only ---'
            (cd backend && python -m pytest tests/ --collect-only -q 2>&1)
            rc2=$?
            echo "exit: $rc2"
            echo '```'
            if [ "$rc1" -ne 0 ] || [ "$rc2" -ne 0 ]; then
              echo "**⚠️ COLLECTION FAILED**"
            else
              echo "**✅ COLLECTION OK**"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        working-directory: ./backend
        run: python -m pytest tests/ -v --tb=long 2>&1
