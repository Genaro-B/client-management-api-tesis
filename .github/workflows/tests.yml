name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        working-directory: ./backend
        run: |
          python -c "import openpyxl, httpx, fastapi, sqlalchemy, pydantic; print('OK')"

      - name: Pytest diagnostics
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cd backend
          {
            echo "### Pytest Diagnostics"
            echo ""
            echo "**pytest version & plugins:**"
            echo '```'
            python -m pytest --version 2>&1
            python -m pytest --trace-config 2>&1 | head -20
            echo '```'
            echo ""
            echo "**collect-only from backend/:**"
            echo '```'
            python -m pytest tests/ --collect-only -q 2>&1
            echo "exit: $?"
            echo '```'
            echo ""
            echo "**run_tests.py output:**"
            echo '```'
            python run_tests.py 2>&1
            echo "exit: $?"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Run tests
        working-directory: ./backend
        run: python run_tests.py
