name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug pytest
        working-directory: ./backend
        continue-on-error: true
        run: |
          echo "# Pytest Debug Output" >> "$GITHUB_STEP_SUMMARY"
          echo '## Python version' >> "$GITHUB_STEP_SUMMARY"
          python --version >> "$GITHUB_STEP_SUMMARY"
          echo '## pytest version' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest --version >> "$GITHUB_STEP_SUMMARY"
          echo '## pytest trace-config' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest --trace-config 2>&1 >> "$GITHUB_STEP_SUMMARY"
          echo '## pytest collect-only single file' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/test_auth_api.py --collect-only 2>&1 >> "$GITHUB_STEP_SUMMARY"
          echo '## pytest run' >> "$GITHUB_STEP_SUMMARY"
          python -m pytest tests/ -v --tb=long 2>&1 >> "$GITHUB_STEP_SUMMARY"

      - name: Run tests
        working-directory: ./backend
        run: python -m pytest tests/ -v --tb=long
