name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        working-directory: ./backend
        run: |
          echo "PWD: $(pwd)"
          echo "FILES: $(ls -la)"
          python -c "import openpyxl, httpx, fastapi, sqlalchemy, pydantic; print('OK')"

      - name: Run tests (diagnóstico)
        run: |
          cd backend
          echo "=== PYTHON ==="
          python --version
          echo "=== IMPORT CHECK ==="
          python -c "
          from src.database.base import Base
          from src.database.session import get_db
          from src.main import create_app
          from src.models.client import Client
          from src.repositories.client_repo import ClientRepository
          print('ALL CONFTEST IMPORTS OK')
          app = create_app()
          print('CREATE_APP OK')
          "
          echo "=== UNITTEST ==="
          python -m unittest discover -s tests/ -p "test_*.py" -v 2>&1
