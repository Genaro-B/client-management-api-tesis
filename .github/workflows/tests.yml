name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with output capture
        id: tests
        run: |
          cd backend
          set +e
          python -m pytest tests/ --collect-only -q 2>&1 | tee /tmp/collect.txt
          echo "COLLECT_EXIT=$?" >> "$GITHUB_ENV"
          python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/run.txt
          echo "RUN_EXIT=$?" >> "$GITHUB_ENV"

      - name: Read and report error
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "COLLECT_EXIT: ${{ env.COLLECT_EXIT }}"
          echo "RUN_EXIT: ${{ env.RUN_EXIT }}"
          echo ""
          echo "=== COLLECT OUTPUT ==="
          cat /tmp/collect.txt 2>/dev/null || echo "No collect file"
          echo ""
          echo "=== RUN OUTPUT ==="
          cat /tmp/run.txt 2>/dev/null || echo "No run file"
