name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        working-directory: ./backend
        run: |
          echo "PWD: $(pwd)"
          echo "FILES: $(ls -la)"
          python -c "import openpyxl, httpx, fastapi, sqlalchemy, pydantic; print('OK')"

      - name: Run tests (diagnóstico)
        run: |
          cd backend
          echo "=== PYTEST VERSION ==="
          python -m pytest --version
          echo "=== TEST AUTH (single file) ==="
          python -m pytest tests/test_auth_api.py -v --tb=long; echo "EXIT_AUTH: $?"
          echo "=== COLLECT ALL ==="
          python -m pytest tests/ --collect-only -q 2>&1; echo "EXIT_COLLECT: $?"
          echo "=== ALL TESTS ==="
          python -m pytest tests/ -v --tb=long 2>&1; echo "EXIT_ALL: $?"
