name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        working-directory: ./backend
        run: |
          echo "PWD: $(pwd)"
          echo "FILES: $(ls -la)"
          python -c "import openpyxl, httpx, fastapi, sqlalchemy, pydantic; print('OK')"

      - name: Capture pytest output
        working-directory: ./backend
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m pytest tests/ -v --tb=long > ../pytest_output.txt 2>&1
          rc=$?
          echo "PYTEST_EXIT=$rc" >> $GITHUB_ENV

      - name: Upload pytest output artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest_output.txt

      - name: Show pytest failure reason
        if: env.PYTEST_EXIT != '0'
        run: |
          {
            echo "### Pytest failed with exit code ${{ env.PYTEST_EXIT }}"
            echo ""
            echo '```'
            head -100 pytest_output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
