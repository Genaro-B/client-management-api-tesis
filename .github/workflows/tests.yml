name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect only
        run: |
          cd backend
          ! python -m pytest tests/ --collect-only -q 2>&1 | tee /tmp/pytest-collect.txt
          echo "collect exit: $?"

      - name: Run tests
        run: |
          cd backend
          ! python -m pytest tests/ -v --tb=long -p no:cacheprovider 2>&1 | tee /tmp/pytest-output.txt
          echo "pytest exit: $?"

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: /tmp/pytest-*.txt
